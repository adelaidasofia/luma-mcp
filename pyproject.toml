[project]
name = "luma-mcp"
version = "0.1.0"
description = "lu.ma events MCP server with draft+confirm safety, audit logging, and prompt-injection scrubbing. Covers event creation, ticket types, coupon codes, guest list, and attendee emails via the official Luma public API."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Adelaida Diaz-Roa" }]
dependencies = [
    "fastmcp>=3.2.4",
    "httpx>=0.28.1",
]

[project.scripts]
luma-mcp = "luma_mcp.server:mcp.run"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["luma_mcp*"]
